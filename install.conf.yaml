---
- defaults:
    link:
      relink: true

- clean: ['~']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [curl -fLo vim/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim, Update vim-plug for vim]

- create:
  - ~/.nvm
  - ~/.terraform.d/plugin-cache
  - ~/.config
  - ~/.config/asciinema
  - ~/.local
  - ~/.local/share
  - ~/.git-template
  - ~/.oh-my-zsh-custom
  - ~/.oh-my-zsh-custom/plugins

- link:
    ~/.bash_profile:
      force: true
    ~/.bash_profile.linux:
    ~/.bash_profile.osx:
    ~/.bashrc:
      force: true
    ~/.zshrc:
      force: true
    ~/.zshenv:
      force: true
    ~/.oh-my-zsh:
    ~/.config/yamllint:
      create: true
      path: config/yamllint
    ~/.condarc:
    ~/.gitconfig:
    ~/.nvm/default-packages:
      path: nvm/default-packages
    ~/.tmux:
    ~/.tmux.conf:
    ~/.vimrc:
    ~/.vim/autoload:
      create: true
      path: vim/autoload
    ~/.vim/config:
      create: true
      path: vim/config
    ~/.terraformrc:
    ~/.terminfo:
    ~/.config/asciinema/config:
      path: config/asciinema/config
    ~/.config/nvim:
      path: config/nvim
    ~/.yarnrc:
    ~/.gitmux.conf:
    ~/.agents:
    ~/.codex/AGENTS.md:
      path: codex/AGENTS.md
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md

- shell:
  - [vim +'PlugInstall --sync' +qall, Install PlugInstall for vim]
  - [vim +'GoInstallBinaries' +qall, Install Go for vim]
  - [vim +'PlugUpdate' +qall, PlugUpdate for vim]
  - [vim +'CocInstall coc-tsserver coc-json coc-html coc-css' +qall]
  - [nvim +qall, Setup nvim]
  - [nvim +'MasonInstallAll' +qall, Install LSP for nvim]
  - [test -d ~/.oh-my-zsh-custom/plugins/zsh-autosuggestions || git clone --depth=1 https://github.com/zsh-users/zsh-autosuggestions ~/.oh-my-zsh-custom/plugins/zsh-autosuggestions, Install zsh-autosuggestions]
  - [test -d ~/.oh-my-zsh-custom/plugins/zsh-syntax-highlighting || git clone --depth=1 https://github.com/zsh-users/zsh-syntax-highlighting ~/.oh-my-zsh-custom/plugins/zsh-syntax-highlighting, Install zsh-syntax-highlighting]
